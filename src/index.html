<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Hola Mundo</title>
  <style>
    :root{
      --bg1:#4f46e5;
      --bg2:#06b6d4;
      --card:#ffffff;
      --accent:#f97316;
      --muted:#6b7280;
      --radius:16px;
      --glass: rgba(255,255,255,0.08);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;}
    body{
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      color:#0f172a;padding:24px;
    }
    .card{
      width:100%;max-width:720px;background:linear-gradient(180deg,rgba(255,255,255,0.9),rgba(255,255,255,0.85));
      border-radius:var(--radius);padding:40px;box-shadow:0 10px 30px rgba(2,6,23,0.4);backdrop-filter: blur(6px);
    }
    header{display:flex;gap:20px;align-items:center}
    .logo{width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,var(--bg1),var(--accent));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:24px}
    h1{margin:0;font-size:28px;color:#0b1220}
    p.lead{margin:12px 0 20px;color:var(--muted);line-height:1.5}
    .controls{display:flex;gap:12px;align-items:center}
    .btn{appearance:none;border:0;padding:12px 18px;border-radius:10px;font-weight:600;cursor:pointer;transition:transform .12s ease, box-shadow .12s ease}
    .btn-primary{background:linear-gradient(90deg,var(--bg1),var(--accent));color:white;box-shadow:0 6px 18px rgba(79,70,229,0.28)}
    .btn-primary:hover{transform:translateY(-2px)}
    .btn-ghost{background:transparent;border:1px solid rgba(15,23,42,0.06);color:#0b1220}
    footer{margin-top:20px;color:var(--muted);font-size:14px}
    @media (max-width:520px){.card{padding:24px}.logo{width:52px;height:52px}}
  </style>
</head>

<body>
  <main class="card" role="main">
    <header>
      <div class="logo" aria-hidden="true">HN</div>
      <div>
        <h1>Hola Mundo</h1>
        <p class="lead">Bienvenido — este es un ejemplo simple y bonito con colores agradables y un botón inactivo.</p>
      </div>
    </header>

    <section class="controls" style="margin-top:20px">
      <button type="button" class="btn btn-primary" aria-label="Botón que no hace nada">No hace nada</button>
      <button type="button" class="btn btn-ghost" aria-hidden="true">Secundario</button>
    </section>

    <footer>
      <p>Suscribete y deja tu like.</p>
    </footer>
  </main>
</body>

</html>
